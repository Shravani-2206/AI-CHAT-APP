<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="main">
        <header class="navbar">
            <nav>
                <div class="nav-left">
                    <h2>AI CHAT APP</h2>
                </div>
                <div class="nav-right">
                    <form>
                        <input type="checkbox"> Search
                    </form>
                </div>
            </nav>
        </header> 

        <div class="one">
            <div class="AI-Intro">
                <h2>Hey EveryBody Welcome to <b>AI Chat App</b></h2>
                <h2>Ask your doubt to me</h2><br>
            </div>

            <div id="chat-container"></div>

            <div class="chat">
                <textarea id="user-input" class="input" placeholder="Ask anything..." rows="1"></textarea>
                <button id="send-btn">
                    <i class="fa-regular fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>  

    <script type="module" src="script.js"></script>
</body>
</html>
